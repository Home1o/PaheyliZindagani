function applyTheme(t){
  var vars=THEMES[t]||THEMES.light, root=document.documentElement;
  for(var k in vars) root.style.setProperty(k,vars[k]);
  root.setAttribute('data-theme',t);
  var b=document.body;
  b.style.backgroundImage='url("'+_HERO+'")';
  b.style.backgroundSize='cover';
  b.style.backgroundPosition='center bottom';
  b.style.backgroundAttachment='fixed';
  b.style.backgroundRepeat='no-repeat';
  b.style.backgroundColor=vars['--bg'];
}
function toggleTheme(){
  var n = getTheme() === 'dark' ? 'light' : 'dark'; setTheme(n);
  var b = document.getElementById('theme-btn');
  if (b) b.textContent = n === 'dark' ? '☀️ Light' : '🌙 Dark';
}
applyTheme(getTheme());

/* ═══════ SESSION (JWT in localStorage) ═════════════════════════════════════ */
function getToken(){ return localStorage.getItem('mg:token') || null; }
function saveToken(t){ localStorage.setItem('mg:token', t); }
function clearToken(){ localStorage.removeItem('mg:token'); localStorage.removeItem('mg:user'); }
function getUser(){ try{ return JSON.parse(localStorage.getItem('mg:user')); }catch(_){ return null; } }
function saveUser(u){ localStorage.setItem('mg:user', JSON.stringify(u)); }
function isAdmin(){ var u = getUser(); return !!(u && u.isAdmin); }

/* ═══════ FETCH HELPER ═══════════════════════════════════════════════════════ */
function apiFetch(path, opts){
  opts = opts || {};
  opts.headers = opts.headers || {};
  opts.headers['Content-Type'] = 'application/json';
  var tok = getToken();
  if (tok) opts.headers['Authorization'] = 'Bearer ' + tok;
  return fetch(API + path, opts).then(function(r){
    return r.json().then(function(data){ return { ok: r.ok, status: r.status, data: data }; });
  });
}
function apiGet(path){ return apiFetch(path, { method: 'GET' }); }
function apiPost(path, body){ return apiFetch(path, { method: 'POST', body: JSON.stringify(body) }); }
function apiPut(path, body){ return apiFetch(path, { method: 'PUT', body: JSON.stringify(body) }); }
function apiDel(path){ return apiFetch(path, { method: 'DELETE' }); }

/* ═══════ UTILS ══════════════════════════════════════════════════════════════ */
function san(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function dec(s){ return String(s||'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'"); }
function fmtDate(ts){ return new Date(ts).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}); }
function ago(ts){
  var d = Date.now() - ts;
  if (d < 60000) return 'just now';
  if (d < 3600000) return Math.floor(d/60000) + 'm ago';
  if (d < 86400000) return Math.floor(d/3600000) + 'h ago';
  return Math.floor(d/86400000) + 'd ago';
}

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--font-h:'Playfair Display',Georgia,serif;--font-b:'Lora',Georgia,serif;--sb-w:300px}
html,body{min-height:100%;font-family:var(--font-b);color:var(--txt);transition:color .25s;background-color:#c5e86b}

/* ── Background image – high opacity ───────────────────────────────────── */
body{background-size:cover;background-position:center bottom;background-attachment:fixed;background-repeat:no-repeat}

/* ── Thin tint so text stays readable without hiding illustration ────────── */
.app-body{position:relative}
.app-body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:rgba(212, 241, 138, 0.28);
  transition:background .25s}
[data-theme=dark] .app-body::before{background:rgba(10,18,2,0.55)}

/* ── All elements above the tint ────────────────────────────────────────── */
.topbar,.main-col,.sidebar{position:relative;z-index:1}

/* ── Topbar: frosted glass ───────────────────────────────────────────────── */
.topbar{backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}

/* ── CONTENT BOX: rounded frosted-glass card wrapping all page content ───── */
.page-blog,.page-disc{
  background:var(--surf);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1.5px solid var(--brd);
  border-radius:20px;
  box-shadow:0 8px 40px var(--shadow);
  margin:24px auto;
}
.page-disc{max-width:960px;padding:28px 28px}
.page-blog{max-width:700px;padding:30px 34px}

/* ── Sidebar: frosted glass ──────────────────────────────────────────────── */

.topbar{background:rgba(255,255,255,0.75);border-bottom:2px solid var(--acc);padding:0 20px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-family:var(--font-h);font-size:1.45rem;font-weight:700;cursor:pointer;color:var(--txt)}
.logo em{color:var(--acc);font-style:normal}
.topbar-right{display:flex;align-items:center;gap:8px}
.nav-pill{font-family:var(--font-b);font-size:.78rem;padding:5px 12px;border-radius:3px;cursor:pointer;border:1px solid var(--brd);background:var(--surf2);color:var(--dim);transition:all .15s}
.nav-pill:hover,.nav-pill.active{background:var(--acc);color:#fff;border-color:var(--acc)}

.app-body{display:flex;min-height:calc(100vh - 54px)}
.main-col{flex:1;min-width:0;overflow-y:auto}
.sidebar{width:var(--sb-w);flex-shrink:0;background:var(--surf);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-left:1.5px solid var(--brd);overflow-y:auto}
.sb-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:199}
.sb-backdrop.open{display:block}
@media(max-width:900px){
  .sidebar{position:fixed;top:54px;right:0;bottom:0;z-index:200;transform:translateX(100%);transition:transform .25s ease}
  .sidebar.open{transform:translateX(0)}
}
@media(min-width:901px){.sidebar.hidden{display:none}}
.sb-sec{padding:16px 15px;border-bottom:1px solid var(--brd)}
.sb-head{font-family:var(--font-h);font-size:.88rem;color:var(--txt);margin-bottom:11px;display:flex;align-items:center;justify-content:space-between}

.page-blog{padding:30px 34px;max-width:700px}
.page-disc{max-width:960px;margin:0 auto;padding:28px 22px}
.pg-label{font-size:.63rem;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);margin-bottom:20px;padding-bottom:9px;border-bottom:1px solid var(--brd)}

.pc{padding:24px 0;border-bottom:1px solid var(--brd);cursor:pointer}
.pc:hover .pc-title{color:var(--acc)}
.pc-meta{font-size:.71rem;color:var(--faint);display:flex;gap:9px;align-items:center;margin-bottom:7px;flex-wrap:wrap}
.tag{background:var(--surf2);color:var(--dim);padding:2px 7px;border-radius:2px;font-size:.66rem}
.pc-title{font-family:var(--font-h);font-size:1.38rem;font-weight:700;line-height:1.2;margin-bottom:7px;color:var(--txt);transition:color .15s}
.pc-exc{color:var(--dim);line-height:1.6;font-size:.91rem;margin-bottom:11px}
.pc-foot{display:flex;align-items:center;gap:13px}
.act{background:none;border:none;cursor:pointer;font-family:var(--font-b);font-size:.81rem;color:var(--faint);display:flex;align-items:center;gap:4px;padding:3px 0;transition:color .15s}
.act:hover{color:var(--acc)}.act.liked{color:var(--acc)}
.adm-btns{margin-left:auto;display:flex;gap:5px}

.back{background:none;border:none;cursor:pointer;font-family:var(--font-b);font-size:.82rem;color:var(--dim);display:flex;align-items:center;gap:5px;margin-bottom:22px;padding:0;transition:color .15s}
.back:hover{color:var(--acc)}
.pd-title{font-family:var(--font-h);font-size:1.9rem;font-weight:700;line-height:1.15;margin-bottom:13px;color:var(--txt)}
.pd-meta{font-size:.73rem;color:var(--faint);display:flex;gap:11px;flex-wrap:wrap;margin-bottom:26px;padding-bottom:17px;border-bottom:1px solid var(--brd)}
.body-txt{font-size:1.02rem;line-height:1.85;color:var(--dim)}
.body-txt p{margin-bottom:1.4em}
.body-txt strong{color:var(--txt);font-weight:500}
.act-bar{margin:26px 0 20px;padding:15px 0;border-top:1px solid var(--brd);border-bottom:1px solid var(--brd);display:flex;gap:18px;align-items:center;flex-wrap:wrap}
.sec-h{font-family:var(--font-h);font-size:1.08rem;margin-bottom:16px;color:var(--txt)}
.cmt{padding:13px 0;border-bottom:1px solid var(--brd)}
.cmt-hdr{display:flex;gap:9px;align-items:baseline;margin-bottom:4px;flex-wrap:wrap}
.cmt-author{font-weight:500;font-size:.85rem;color:var(--txt)}
.cmt-time{font-size:.71rem;color:var(--faint)}
.cmt-del{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--faint);font-size:.72rem;padding:0}
.cmt-del:hover{color:var(--red)}
.cmt-txt{color:var(--dim);line-height:1.6;font-size:.91rem}

.disc-toolbar{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
.disc-toolbar-title{font-family:var(--font-h);font-size:1.5rem;color:var(--txt);flex:1}
.search-box{display:flex;align-items:center;gap:6px;background:var(--surf2);border:1px solid var(--brd);border-radius:4px;padding:0 10px;flex:1;min-width:160px;max-width:260px}
.search-box:focus-within{border-color:var(--acc)}
.search-box input{background:none;border:none;color:var(--txt);font-family:var(--font-b);font-size:.85rem;padding:8px 0;outline:none;width:100%}
.search-box input::placeholder{color:var(--faint)}
.tags-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.tags-lbl{font-size:.67rem;color:var(--faint);letter-spacing:.1em;text-transform:uppercase}
.filter-tag{background:var(--surf2);color:var(--dim);border:1px solid var(--brd);padding:3px 10px;border-radius:12px;font-size:.72rem;cursor:pointer;transition:all .15s}
.filter-tag:hover{border-color:var(--acc);color:var(--acc)}
.filter-tag.active{background:var(--acc);color:#fff;border-color:var(--acc)}
.disc-card{background:var(--surf);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid var(--brd);border-radius:14px;padding:18px 22px;cursor:pointer;transition:border-color .15s,background .15s;border-bottom:none}
.disc-card:first-child{border-radius:4px 4px 0 0}

.disc-status{font-size:.64rem;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.06em;flex-shrink:0;margin-top:3px}
.disc-status.open{background:rgba(76,175,128,.15);color:var(--grn);border:1px solid rgba(76,175,128,.3)}
.disc-status.closed{background:var(--surf3);color:var(--faint);border:1px solid var(--brd)}
.disc-body-prev{font-size:.88rem;color:var(--dim);line-height:1.55;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.disc-footer{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.disc-meta-txt{font-size:.72rem;color:var(--faint)}

.disc-tag-chip:hover{background:var(--acc);color:#fff}

.d-title-h{font-family:var(--font-h);font-size:1.45rem;font-weight:700;color:var(--txt);margin-bottom:8px}
.d-meta-bar{font-size:.73rem;color:var(--faint);display:flex;gap:12px;flex-wrap:wrap;align-items:center;padding-bottom:14px;border-bottom:1px solid var(--brd);margin-bottom:20px}
.tree-hint{font-size:.78rem;color:var(--dim);margin-bottom:16px;line-height:1.6;padding:10px 14px;background:var(--surf2);border-radius:4px;border-left:3px solid var(--acc)}

.branch-node{margin-bottom:6px}

.branch-card{padding:13px 16px;background:var(--surf);border:1px solid var(--brd);border-radius:4px;margin-bottom:4px;transition:border-color .15s}
.branch-card.root-branch{background:var(--surf2);border-left:3px solid var(--acc)}

.branch-hdr{display:flex;align-items:center;gap:7px;margin-bottom:6px;flex-wrap:wrap}
.branch-author-nm{font-weight:600;font-size:.82rem;color:var(--txt)}
.branch-time-txt{font-size:.69rem;color:var(--faint)}
.branch-type-badge{font-size:.6rem;padding:1px 7px;border-radius:8px;text-transform:uppercase;letter-spacing:.05em}
.btype-root{background:rgba(212,120,46,.2);color:var(--acc)}
.btype-branch{background:rgba(74,159,212,.2);color:var(--blue)}

.branch-pts-lbl{font-size:.65rem;color:var(--acc2);margin-left:auto}
.branch-txt-body{font-size:.91rem;color:var(--dim);line-height:1.6;margin-bottom:10px}
.branch-acts{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.vote-btn{background:none;border:1px solid var(--brd);cursor:pointer;font-family:var(--font-b);font-size:.73rem;color:var(--dim);padding:3px 9px;border-radius:3px;transition:all .15s}
.vote-btn:hover{border-color:var(--acc);color:var(--acc)}
.vote-btn.vu{background:rgba(76,175,128,.15);color:var(--grn);border-color:var(--grn)}
.vote-btn.vm{background:rgba(155,127,212,.2);color:var(--purple);border-color:var(--purple)}
.act-btn{background:none;border:1px solid var(--brd);cursor:pointer;font-family:var(--font-b);font-size:.73rem;color:var(--dim);padding:3px 9px;border-radius:3px;transition:all .15s}
.act-btn:hover{border-color:var(--acc2);color:var(--acc2)}
.merge-badge{font-size:.67rem;color:var(--purple);padding:2px 8px;border:1px solid rgba(155,127,212,.3);border-radius:8px;background:rgba(155,127,212,.1)}
.inline-form{background:var(--surf2);border:1px solid var(--brd);border-radius:4px;padding:13px;margin-top:6px;display:none}
.inline-form.open{display:block}
.form-tabs{display:flex;gap:5px;margin-bottom:10px}
.ftab{background:none;border:1px solid var(--brd);cursor:pointer;font-family:var(--font-b);font-size:.73rem;color:var(--dim);padding:4px 11px;border-radius:3px;transition:all .15s}
.ftab:hover{border-color:var(--acc);color:var(--acc)}
.ftab.active{background:var(--acc);color:#fff;border-color:var(--acc)}
.children-count{font-size:.67rem;color:var(--faint);margin-top:5px}
.new-disc-form{background:var(--surf);border:1px solid var(--brd);border-radius:4px;padding:22px;margin-bottom:22px;display:none}

.tag-pills{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}

.di-item{padding:8px 0;border-bottom:1px solid var(--brd);cursor:pointer}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.87);z-index:500;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:var(--surf);border:1px solid var(--brd);border-radius:5px;padding:26px;width:100%;max-width:420px;max-height:92vh;overflow-y:auto}
.modal-h{font-family:var(--font-h);font-size:1.25rem;color:var(--txt);margin-bottom:18px}
.modal-footer{display:flex;gap:9px;justify-content:flex-end;margin-top:16px;padding-top:13px;border-top:1px solid var(--brd)}
.post-modal-inner{max-width:560px}
.otp-inp{width:100%;font-family:monospace;font-size:1.8rem;letter-spacing:.3em;text-align:center;background:var(--surf2);border:2px solid var(--acc);color:var(--acc);padding:14px;border-radius:4px;font-weight:700}
.otp-inp:focus{outline:none}

.lb-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--brd)}

.lb-name{font-size:.84rem;color:var(--txt);flex:1}
.lb-pts-val{font-size:.8rem;font-weight:600;color:var(--acc)}
.pts-badge{font-size:.67rem;padding:2px 7px;background:rgba(212,120,46,.15);color:var(--acc);border:1px solid rgba(212,120,46,.3);border-radius:10px}

.inp{width:100%;background:var(--surf2);border:1px solid var(--brd);color:var(--txt);font-family:var(--font-b);font-size:.86rem;padding:9px 12px;border-radius:3px;transition:border-color .15s}
.inp:focus{outline:none;border-color:var(--acc)}
.txa{width:100%;background:var(--surf2);border:1px solid var(--brd);color:var(--txt);font-family:var(--font-b);font-size:.88rem;padding:10px 12px;border-radius:3px;resize:vertical;min-height:80px;transition:border-color .15s}
.txa:focus{outline:none;border-color:var(--acc)}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.fl{font-size:.69rem;color:var(--faint);letter-spacing:.07em;text-transform:uppercase}
.err-msg{font-size:.75rem;color:var(--red);margin-top:4px}
.mf{width:100%;background:var(--surf2);border:1px solid var(--brd);color:var(--txt);font-family:var(--font-b);font-size:.88rem;padding:8px 11px;border-radius:3px;margin-top:4px}
.mf:focus{outline:none;border-color:var(--acc)}
.mf-area{min-height:170px;resize:vertical;line-height:1.65}

.btn{font-family:var(--font-b);font-size:.82rem;padding:7px 14px;border-radius:3px;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-acc{background:var(--acc);color:#fff}.btn-acc:hover{background:var(--acc2)}
.btn-out{background:transparent;color:var(--txt);border:1px solid var(--brd)}.btn-out:hover{border-color:var(--acc);color:var(--acc)}
.btn-ghost{background:transparent;color:var(--dim);border:none}.btn-ghost:hover{color:var(--txt)}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{opacity:.85}
.btn-sm{font-size:.74rem;padding:4px 10px}
.btn-link{background:none;border:none;cursor:pointer;color:var(--acc2);font-family:var(--font-b);font-size:inherit;padding:0;text-decoration:underline}
.btn-link:hover{color:var(--acc)}
.ctrl-btn{background:var(--surf2);border:1px solid var(--brd);color:var(--txt);padding:6px 11px;border-radius:3px;cursor:pointer;font-size:.76rem;font-family:var(--font-b);transition:all .15s}
.ctrl-btn:hover{border-color:var(--acc);color:var(--acc)}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surf3);color:var(--txt);border:1px solid var(--brd);padding:10px 22px;border-radius:20px;font-size:.83rem;z-index:600;box-shadow:0 4px 20px var(--shadow);white-space:nowrap;animation:pop .2s ease;pointer-events:none}
@keyframes pop{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.empty{color:var(--faint);font-size:.82rem;font-style:italic;padding:7px 0}
.empty-state{text-align:center;padding:50px 20px;color:var(--faint)}
.empty-state h3{font-family:var(--font-h);font-size:1.1rem;color:var(--dim);margin-bottom:8px}
.loading{color:var(--faint);font-size:.85rem;padding:20px 0;text-align:center}
.auth-sw{font-size:.77rem;color:var(--faint);text-align:center;margin-top:9px}
.mt8{margin-top:8px}.mt12{margin-top:12px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--brd);border-radius:2px}
</style>
</head>
<body>

<header class="topbar">
  <div style="display:flex;align-items:center;gap:12px">
    <div class="logo" onclick="showBlog()">Paheyli<em> </em>Zindagani</div>
    <button class="nav-pill active" id="nav-blog" onclick="showBlog()">📝 Blog</button>
    <button class="nav-pill" id="nav-disc" onclick="showDiscussions()">💬 Discussions</button>
  </div>
  <div class="topbar-right">
    <div id="hdr-admin"></div>
    <button class="ctrl-btn" id="theme-btn" onclick="toggleTheme()">☀️ Light</button>
    <button class="ctrl-btn" onclick="toggleSidebar()">☰</button>
  </div>
</header>

<div class="app-body">
  <div class="main-col" id="main-col">

    <!-- BLOG -->
    <div id="section-blog">
      <div id="blog-list" class="page-blog">
        <div class="pg-label">Latest Essays</div>
        <div id="posts-container"><p class="loading">Loading…</p></div>
      </div>
      <div id="blog-detail" class="page-blog" style="display:none">
        <button class="back" onclick="showBlogList()">← All Essays</button>
        <div id="detail-body"></div>
      </div>
    </div>

    <!-- DISCUSSIONS -->
    <div id="section-disc" style="display:none">
      <div id="disc-list-view" class="page-disc">
        <div class="disc-toolbar">
          <div class="disc-toolbar-title">💬 Discussions</div>
          <div class="search-box">
            <span style="color:var(--faint);font-size:.85rem">🔍</span>
            <input id="disc-srch" placeholder="Search…" oninput="renderDiscList()"/>
          </div>
          <button class="btn btn-acc" onclick="openNewDiscForm()">+ Start Discussion</button>
          <button class="ctrl-btn" onclick="openLeaderboard()" title="Leaderboard">🏆</button>
        </div>
        <div class="tags-bar" id="disc-tags-bar"></div>
        <div id="new-disc-form" class="new-disc-form">
          <div class="form-heading">Start a New Discussion</div>
          <div class="fg"><label class="fl">Title *</label><input class="inp" id="disc-title" placeholder="What's the discussion about?"/></div>
          <div class="fg"><label class="fl">Opening Statement</label><textarea class="txa" id="disc-body-inp" placeholder="Share your opening thought…" style="min-height:96px"></textarea></div>
          <div class="fg"><label class="fl">Tags (Enter or comma to add)</label><input class="inp" id="tag-inp" placeholder="philosophy, culture…" onkeydown="handleTagKey(event)"/><div class="tag-pills" id="tag-pills"></div></div>
          <div id="new-disc-err" class="err-msg"></div>
          <div style="display:flex;gap:8px;margin-top:4px">
            <button class="btn btn-acc" onclick="submitDisc()">Start Discussion 🌱</button>
            <button class="btn btn-ghost" onclick="closeNewDiscForm()">Cancel</button>
          </div>
        </div>
        <div id="disc-list-el"><p class="loading">Loading…</p></div>
      </div>
      <div id="disc-detail-view" class="page-disc" style="display:none">
        <button class="back" onclick="backToDiscList()">← All Discussions</button>
        <div id="disc-detail-inner"></div>
        <div id="tree-container"></div>
      </div>
    </div>

  </div>

  <aside class="sidebar" id="sidebar">
    <div class="sb-sec">
      <div class="sb-head">🔍 Search</div>
      <input class="inp" id="srch-inp" placeholder="Search essays…" oninput="doSearch(this.value)"/>
      <div id="srch-out" style="margin-top:9px"></div>
    </div>
    <div class="sb-sec">
      <div class="sb-head">
        <span>💬 Recent Discussions</span>
        <button class="btn-link" style="font-size:.73rem" onclick="showDiscussions()">All →</button>
      </div>
      <div id="disc-panel"></div>
    </div>
    <div class="sb-sec" id="auth-sec">
      <div id="auth-panel"></div>
    </div>
  </aside>
</div>
<div class="sb-backdrop" id="sb-backdrop" onclick="closeSidebar()"></div>

<!-- POST MODAL -->
<div class="overlay" id="post-modal" onclick="if(event.target===this)closePostModal()">
  <div class="modal post-modal-inner">
    <div class="modal-h" id="post-modal-h">New Essay</div>
    <input type="hidden" id="edit-id"/>
    <div class="fg"><label class="fl">Title *</label><input class="mf" id="f-title" placeholder="Essay title…"/></div>
    <div class="fg"><label class="fl">Excerpt</label><input class="mf" id="f-exc" placeholder="Short preview…"/></div>
    <div class="fg"><label class="fl">Content * (HTML ok)</label><textarea class="mf mf-area" id="f-body" placeholder="&lt;p&gt;Your essay…&lt;/p&gt;"></textarea></div>
    <div class="fg"><label class="fl">Tags (comma separated)</label><input class="mf" id="f-tags" placeholder="culture, philosophy"/></div>
    <div class="fg" style="max-width:110px"><label class="fl">Read time (mins)</label><input class="mf" id="f-rt" type="number" min="1" max="120" value="3"/></div>
    <div id="post-modal-err" class="err-msg"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closePostModal()">Cancel</button>
      <button class="btn btn-acc" id="post-modal-sub" onclick="submitPost()">Publish</button>
    </div>
  </div>
</div>

<!-- AUTH MODAL -->
<div class="overlay" id="auth-modal" onclick="if(event.target===this)closeAuthModal()">
  <div class="modal"><div id="auth-modal-body"></div></div>
</div>

<!-- LEADERBOARD MODAL -->
<div class="overlay" id="lb-modal" onclick="if(event.target===this)closeLbModal()">
  <div class="modal" style="max-width:440px">
    <div style="font-family:var(--font-h);font-size:1.2rem;color:var(--txt);margin-bottom:12px">🏆 Points Leaderboard</div>
    <div style="font-size:.78rem;color:var(--dim);margin-bottom:14px;line-height:1.5">Earn points when others branch from your posts or add leaves to your branches.</div>
    <div id="lb-body"></div>
    <div style="margin-top:16px;padding-top:13px;border-top:1px solid var(--brd);display:flex;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeLbModal()">Close</button>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="overlay" id="confirm-modal" onclick="if(event.target===this)cancelConfirm()">
  <div class="modal" style="max-width:360px">
    <div id="confirm-msg" style="font-family:var(--font-b);font-size:.95rem;color:var(--txt);margin-bottom:20px;line-height:1.6"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cancelConfirm()">Cancel</button>
      <button class="btn btn-red" id="confirm-ok-btn" onclick="confirmOk()">Confirm</button>
    </div>
  </div>
</div>

<div id="toast-el" style="display:none" class="toast"></div>

<script>
'use strict';

/* ══════════════════════════════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════════════════════════ */
var curPost       = null;   // currently open post object
var currentDisc   = null;   // currently open discussion object
var allPosts      = [];     // cached post list
var activeTag     = null;   // discussion tag filter
var pendingTags   = [];     // tags being added to new discussion
var openFormIds   = {};     // which branch inline forms are open
var pendingAction = null;   // action to run after login
var sbOpen        = false;
var sbVis         = true;
var _confirmCb    = null;

/* ══════════════════════════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', function() {
  var btn = document.getElementById('theme-btn');
  if (btn) btn.textContent = getTheme() === 'dark' ? '☀️ Light' : '🌙 Dark';
  renderAuth();
  renderAdminBtn();
  loadPosts();
  loadDiscPanel();
});

/* ══════════════════════════════════════════════════════════════════════════════
   TOAST / CONFIRM
══════════════════════════════════════════════════════════════════════════════ */
var _toastTimer;
function toast(msg) {
  var el = document.getElementById('toast-el');
  el.textContent = msg; el.style.display = 'block';
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function(){ el.style.display = 'none'; }, 2800);
}
function customConfirm(msg, label, cb) {
  document.getElementById('confirm-msg').textContent = msg;
  document.getElementById('confirm-ok-btn').textContent = label || 'Confirm';
  document.getElementById('confirm-modal').classList.add('open');
  _confirmCb = cb;
}
function confirmOk() {
  document.getElementById('confirm-modal').classList.remove('open');
  if (_confirmCb) { var fn = _confirmCb; _confirmCb = null; fn(); }
}
function cancelConfirm() {
  document.getElementById('confirm-modal').classList.remove('open');
  _confirmCb = null;
}

/* ══════════════════════════════════════════════════════════════════════════════
   SIDEBAR
══════════════════════════════════════════════════════════════════════════════ */
function toggleSidebar() {
  if (window.innerWidth > 900) {
    sbVis = !sbVis;
    document.getElementById('sidebar').classList.toggle('hidden', !sbVis);
  } else {
    sbOpen = !sbOpen;
    document.getElementById('sidebar').classList.toggle('open', sbOpen);
    document.getElementById('sb-backdrop').classList.toggle('open', sbOpen);
  }
}
function closeSidebar() {
  sbOpen = false;
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sb-backdrop').classList.remove('open');
}

/* ══════════════════════════════════════════════════════════════════════════════
   PAGE ROUTING
══════════════════════════════════════════════════════════════════════════════ */
function showBlog() {
  document.getElementById('section-blog').style.display = '';
  document.getElementById('section-disc').style.display = 'none';
  document.getElementById('nav-blog').classList.add('active');
  document.getElementById('nav-disc').classList.remove('active');
}
function showDiscussions() {
  document.getElementById('section-blog').style.display = 'none';
  document.getElementById('section-disc').style.display = '';
  document.getElementById('nav-blog').classList.remove('active');
  document.getElementById('nav-disc').classList.add('active');
  document.getElementById('disc-list-view').style.display = '';
  document.getElementById('disc-detail-view').style.display = 'none';
  loadDiscussions();
  loadDiscPanel();
}

/* ══════════════════════════════════════════════════════════════════════════════
   AUTH UI
══════════════════════════════════════════════════════════════════════════════ */
function renderAdminBtn() {
  document.getElementById('hdr-admin').innerHTML = isAdmin()
    ? '<button class="btn btn-acc btn-sm" onclick="openNewPostModal()">✏️ New Post</button>' : '';
}

function renderAuth() {
  var user = getUser(), el = document.getElementById('auth-panel');
  if (user) {
    apiGet('/api/leaderboard').then(function(r) {
      var pts = 0;
      if (r.ok) { var me = r.data.find(function(x){ return x.name === user.name; }); if (me) pts = me.total; }
      el.innerHTML =
        '<div style="font-size:.66rem;color:var(--faint);letter-spacing:.1em;text-transform:uppercase;margin-bottom:9px">Signed In</div>'
        + '<div style="display:flex;flex-direction:column;gap:5px">'
        + '<div style="font-size:.92rem;font-weight:500;color:var(--txt)">'+san(user.name)+'</div>'
        + (user.isAdmin ? '<span style="font-size:.61rem;padding:2px 7px;background:var(--acc);color:#fff;border-radius:2px;text-transform:uppercase;align-self:flex-start">Admin</span>' : '')
        + (pts > 0 ? '<span class="pts-badge" style="align-self:flex-start">⭐ '+pts+' pts</span>' : '')
        + '<div style="font-size:.73rem;color:var(--faint)">'+san(user.email)+'</div>'
        + '<button class="btn btn-out btn-sm" style="align-self:flex-start;margin-top:8px" onclick="doLogout()">Sign Out</button>'
        + '</div>';
    });
  } else {
    el.innerHTML =
      '<div style="font-family:var(--font-h);font-size:.9rem;margin-bottom:12px">Sign In</div>'
      + '<div class="fg"><label class="fl">Email</label><input class="inp" id="li-em" type="email" placeholder="your@email.com" onkeydown="if(event.key===\'Enter\')doSidebarLogin()"/></div>'
      + '<div class="fg"><label class="fl">Password</label><input class="inp" id="li-pw" type="password" placeholder="Password" onkeydown="if(event.key===\'Enter\')doSidebarLogin()"/></div>'
      + '<div id="li-err" class="err-msg"></div>'
      + '<button class="btn btn-acc" style="margin-top:8px;width:100%;justify-content:center" onclick="doSidebarLogin()">Sign In</button>'
      + '<div class="auth-sw">No account? <button class="btn-link" onclick="openAuthModal(\'register\')">Register →</button></div>';
  }
}

function doSidebarLogin() {
  var em = (document.getElementById('li-em').value||'').trim();
  var pw = (document.getElementById('li-pw').value||'').trim();
  apiPost('/api/auth/login', { email: em, password: pw }).then(function(r) {
    if (!r.ok) {
      if (r.data.needsVerify) { openAuthModal('otp:' + r.data.email); return; }
      document.getElementById('li-err').textContent = r.data.error;
      return;
    }
    saveToken(r.data.token); saveUser(r.data.user);
    toast('Welcome back, ' + r.data.user.name + '! ✓');
    renderAuth(); renderAdminBtn(); loadPosts();
    if (curPost) reloadCurrentPost();
    if (currentDisc) loadDiscDetail(currentDisc.id);
    if (pendingAction) { var fn = pendingAction; pendingAction = null; fn(); }
  });
}

function doLogout() {
  clearToken(); toast('Signed out.');
  renderAuth(); renderAdminBtn();
  loadPosts();
  if (curPost) reloadCurrentPost();
  if (currentDisc) loadDiscDetail(currentDisc.id);
}

/* ══════════════════════════════════════════════════════════════════════════════
   AUTH MODAL
══════════════════════════════════════════════════════════════════════════════ */
function openAuthModal(mode) {
  document.getElementById('auth-modal').classList.add('open');
  if (mode === 'login') renderLoginModal();
  else if (mode === 'register') renderRegisterModal();
  else if (mode && mode.startsWith('otp:')) renderOTPModal(mode.slice(4));
}
function closeAuthModal() { document.getElementById('auth-modal').classList.remove('open'); }

function renderLoginModal() {
  document.getElementById('auth-modal-body').innerHTML =
    '<div class="modal-h">Sign In</div>'
    + '<div class="fg"><label class="fl">Email</label><input class="inp" id="m-em" type="email" placeholder="your@email.com" onkeydown="if(event.key===\'Enter\')doModalLogin()"/></div>'
    + '<div class="fg"><label class="fl">Password</label><input class="inp" id="m-pw" type="password" placeholder="Password" onkeydown="if(event.key===\'Enter\')doModalLogin()"/></div>'
    + '<div id="m-err" class="err-msg"></div>'
    + '<div class="modal-footer"><button class="btn btn-ghost" onclick="closeAuthModal()">Cancel</button><button class="btn btn-acc" onclick="doModalLogin()">Sign In</button></div>'
    + '<div style="text-align:center;margin-top:12px;font-size:.78rem;color:var(--faint)">No account? <button class="btn-link" onclick="renderRegisterModal()">Register free →</button></div>';
  setTimeout(function(){ var e=document.getElementById('m-em'); if(e)e.focus(); }, 50);
}

function renderRegisterModal() {
  document.getElementById('auth-modal-body').innerHTML =
    '<div class="modal-h">Create Account</div>'
    + '<div class="fg"><label class="fl">Name</label><input class="inp" id="m-nm" placeholder="Your name"/></div>'
    + '<div class="fg"><label class="fl">Email</label><input class="inp" id="m-em" type="email" placeholder="your@email.com"/></div>'
    + '<div class="fg"><label class="fl">Password (min 8 chars)</label><input class="inp" id="m-pw" type="password" placeholder="Choose a password"/></div>'
    + '<div id="m-err" class="err-msg"></div>'
    + '<div class="modal-footer"><button class="btn btn-ghost" onclick="closeAuthModal()">Cancel</button><button class="btn btn-acc" onclick="doModalRegister()">Continue →</button></div>'
    + '<div style="text-align:center;margin-top:12px;font-size:.78rem;color:var(--faint)">Have account? <button class="btn-link" onclick="renderLoginModal()">Sign in →</button></div>';
}

function renderOTPModal(email) {
  document.getElementById('auth-modal-body').innerHTML =
    '<div class="modal-h">Verify Email</div>'
    + '<div style="font-size:.82rem;color:var(--dim);margin-bottom:16px;line-height:1.55">Enter the 6-digit code sent to <strong style="color:var(--txt)">'+san(email)+'</strong>.<br><em style="font-size:.78rem;color:var(--faint)">(Check the server console if SMTP is not configured.)</em></div>'
    + '<div class="fg"><label class="fl">6-digit Code</label><input class="otp-inp" id="m-otp" type="text" maxlength="6" placeholder="000000" oninput="this.value=this.value.replace(/[^0-9]/g,\'\')" onkeydown="if(event.key===\'Enter\')doModalVerifyOTP(\''+san(email)+'\')"/></div>'
    + '<div id="m-err" class="err-msg"></div>'
    + '<div class="modal-footer"><button class="btn btn-ghost" onclick="renderRegisterModal()">← Back</button><button class="btn btn-acc" onclick="doModalVerifyOTP(\''+san(email)+'\')">Verify & Sign In →</button></div>'
    + '<div style="text-align:center;margin-top:12px;font-size:.78rem;color:var(--faint)">No code? <button class="btn-link" onclick="doResendOTP(\''+san(email)+'\')">Resend →</button></div>';
  setTimeout(function(){ var e=document.getElementById('m-otp'); if(e)e.focus(); }, 50);
}

function doModalLogin() {
  var em = (document.getElementById('m-em').value||'').trim();
  var pw = (document.getElementById('m-pw').value||'').trim();
  apiPost('/api/auth/login', { email: em, password: pw }).then(function(r) {
    if (!r.ok) {
      if (r.data.needsVerify) { renderOTPModal(r.data.email); return; }
      document.getElementById('m-err').textContent = r.data.error; return;
    }
    saveToken(r.data.token); saveUser(r.data.user);
    closeAuthModal(); toast('Welcome back, ' + r.data.user.name + '! ✓');
    renderAuth(); renderAdminBtn(); loadPosts(); loadDiscPanel();
    if (curPost) reloadCurrentPost();
    if (currentDisc) loadDiscDetail(currentDisc.id);
    if (pendingAction) { var fn = pendingAction; pendingAction = null; fn(); }
  });
}

function doModalRegister() {
  var nm = (document.getElementById('m-nm').value||'').trim();
  var em = (document.getElementById('m-em').value||'').trim();
  var pw = (document.getElementById('m-pw').value||'').trim();
  apiPost('/api/auth/register', { name: nm, email: em, password: pw }).then(function(r) {
    if (!r.ok) { document.getElementById('m-err').textContent = r.data.error; return; }
    renderOTPModal(em);
  });
}

function doModalVerifyOTP(email) {
  var code = (document.getElementById('m-otp').value||'').trim();
  apiPost('/api/auth/verify-otp', { email: email, code: code }).then(function(r) {
    if (!r.ok) { document.getElementById('m-err').textContent = r.data.error; return; }
    saveToken(r.data.token); saveUser(r.data.user);
    closeAuthModal(); toast('Verified! Welcome, ' + r.data.user.name + '! 🎉');
    renderAuth(); renderAdminBtn(); loadDiscPanel();
    if (currentDisc) loadDiscDetail(currentDisc.id);
    if (pendingAction) { var fn = pendingAction; pendingAction = null; fn(); }
  });
}

function doResendOTP(email) {
  apiPost('/api/auth/resend-otp', { email: email }).then(function(r) {
    toast(r.ok ? 'New code sent!' : (r.data.error || 'Could not resend.'));
  });
}

/* ══════════════════════════════════════════════════════════════════════════════
   BLOG — POSTS
══════════════════════════════════════════════════════════════════════════════ */
function loadPosts(q, tag) {
  var qs = '';
  if (q) qs = '?q=' + encodeURIComponent(q);
  else if (tag) qs = '?tag=' + encodeURIComponent(tag);
  document.getElementById('posts-container').innerHTML = '<p class="loading">Loading…</p>';
  apiGet('/api/posts' + qs).then(function(r) {
    if (!r.ok) { document.getElementById('posts-container').innerHTML = '<p class="empty">Could not load posts.</p>'; return; }
    allPosts = r.data;
    renderPosts();
  });
}

function renderPosts() {
  var el = document.getElementById('posts-container'), user = getUser();
  if (!allPosts.length) { el.innerHTML = '<p class="empty">No essays yet.</p>'; return; }
  el.innerHTML = allPosts.map(function(p) {
    var liked = p.liked;
    var tags  = (p.tags||[]).slice(0,3).map(function(t){ return '<span class="tag">'+san(t)+'</span>'; }).join('');
    var adm   = isAdmin()
      ? '<div class="adm-btns"><button class="btn btn-out btn-sm" onclick="event.stopPropagation();openEditPostModal(\''+p.id+'\')">✏️</button>'
        + '<button class="btn btn-red btn-sm" onclick="event.stopPropagation();doDeletePost('+p.id+')">🗑</button></div>' : '';
    return '<article class="pc" onclick="openPost('+p.id+')">'
      + '<div class="pc-meta"><span>'+fmtDate(p.createdAt)+'</span>·<span>'+p.readTime+'min</span>'+tags+'</div>'
      + '<h2 class="pc-title">'+san(p.title)+'</h2>'
      + '<p class="pc-exc">'+san(p.excerpt)+'</p>'
      + '<div class="pc-foot" onclick="event.stopPropagation()">'
        + '<button class="act'+(liked?' liked':'')+'" onclick="doLike('+p.id+')">'+(liked?'❤️':'🤍')+' '+p.likes.length+'</button>'
        + '<button class="act" onclick="openPost('+p.id+')">💬 '+p.comments.length+'</button>'
        + adm
      + '</div></article>';
  }).join('');
}

function showBlogList() {
  curPost = null;
  document.getElementById('blog-list').style.display = '';
  document.getElementById('blog-detail').style.display = 'none';
  document.getElementById('srch-inp').value = '';
  document.getElementById('srch-out').innerHTML = '';
  loadPosts();
  window.scrollTo(0, 0);
}

function openPost(id) {
  document.getElementById('blog-list').style.display = 'none';
  document.getElementById('blog-detail').style.display = '';
  document.getElementById('detail-body').innerHTML = '<p class="loading">Loading…</p>';
  apiGet('/api/posts/' + id).then(function(r) {
    if (!r.ok) { document.getElementById('detail-body').innerHTML = '<p class="empty">Post not found.</p>'; return; }
    curPost = r.data;
    buildPostDetail(r.data);
  });
  window.scrollTo(0, 0);
}

function reloadCurrentPost() {
  if (!curPost) return;
  apiGet('/api/posts/' + curPost.id).then(function(r) {
    if (r.ok) { curPost = r.data; buildPostDetail(r.data); }
  });
}

function buildPostDetail(p) {
  var user = getUser(), liked = p.liked;
  var tags = (p.tags||[]).map(function(t){ return '<span class="tag">'+san(t)+'</span>'; }).join('');
  var adm  = isAdmin()
    ? '<div class="adm-btns" style="margin-left:auto">'
      + '<button class="btn btn-out btn-sm" onclick="openEditPostModal(\''+p.id+'\')">✏️ Edit</button>'
      + '<button class="btn btn-red btn-sm" onclick="doDeletePost('+p.id+')">🗑 Delete</button></div>' : '';
  var cmtHtml = p.comments.length
    ? p.comments.map(function(c) {
        var del = (isAdmin() || (user && c.authorEmail === user.email)) ? '<button class="cmt-del" onclick="doCmtDel('+p.id+','+c.id+')">✕</button>' : '';
        return '<div class="cmt" id="cmt-'+c.id+'">'
          + '<div class="cmt-hdr"><span class="cmt-author">'+san(c.author)+'</span>'
          + '<span class="cmt-time">'+ago(c.createdAt)+'</span>'+del+'</div>'
          + '<p class="cmt-txt">'+san(c.text)+'</p></div>';
      }).join('')
    : '<p class="empty" id="no-cmt">No comments yet.</p>';
  var cmtForm = user
    ? '<div class="mt12"><textarea class="txa" id="cmt-inp" placeholder="Write your comment…"></textarea>'
      + '<div class="mt8"><button class="btn btn-acc" onclick="doComment('+p.id+')">Post Comment</button></div></div>'
    : '<p class="empty mt12" style="font-style:normal"><strong style="color:var(--txt)">Want to comment?</strong> '
      + '<button class="btn-link" onclick="openAuthModal(\'login\')">Sign in →</button></p>';

  document.getElementById('detail-body').innerHTML =
    '<div class="pd-meta"><span>'+fmtDate(p.createdAt)+'</span>·<span>'+p.readTime+' min</span>'+tags+'</div>'
    + '<h1 class="pd-title">'+san(p.title)+'</h1>'
    + '<div class="body-txt">'+p.content+'</div>'
    + '<div class="act-bar">'
      + '<button class="act'+(liked?' liked':'')+'" id="like-btn" onclick="doLike('+p.id+')">'
        + (liked?'❤️':'🤍')+' <span id="like-ct">'+p.likes.length+'</span></button>'
      + '<button class="act">💬 '+p.comments.length+'</button>'+adm+'</div>'
    + '<h3 class="sec-h">Comments ('+p.comments.length+')</h3>'
    + '<div id="cmt-list">'+cmtHtml+'</div>'+cmtForm;
}

/* ── LIKES ── */
function doLike(postId) {
  if (!getUser()) return openAuthModal('login');
  apiPost('/api/posts/' + postId + '/like').then(function(r) {
    if (!r.ok) return toast(r.data.error || 'Could not like.');
    // Update cached post
    allPosts = allPosts.map(function(p){ return p.id === postId ? Object.assign({}, p, { liked: r.data.liked, likes: r.data.likes }) : p; });
    if (curPost && curPost.id === postId) {
      curPost.liked = r.data.liked; curPost.likes = r.data.likes;
      var btn = document.getElementById('like-btn');
      if (btn) btn.innerHTML = (r.data.liked?'❤️':'🤍')+' <span id="like-ct">'+r.data.likeCount+'</span>';
      if (btn) btn.className = 'act'+(r.data.liked?' liked':'');
    } else renderPosts();
  });
}

/* ── COMMENTS ── */
function doComment(postId) {
  var user = getUser(); if (!user) return openAuthModal('login');
  var inp = document.getElementById('cmt-inp'); if (!inp) return;
  var text = inp.value.trim(); if (!text) return toast('Comment cannot be empty.');
  apiPost('/api/posts/' + postId + '/comments', { text: text }).then(function(r) {
    if (!r.ok) return toast(r.data.error || 'Could not post comment.');
    inp.value = '';
    var c = r.data;
    var noMsg = document.getElementById('no-cmt'); if (noMsg) noMsg.remove();
    var list = document.getElementById('cmt-list');
    if (list) {
      var del = isAdmin() ? '<button class="cmt-del" onclick="doCmtDel('+postId+','+c.id+')">✕</button>' : '';
      var div = document.createElement('div'); div.className='cmt'; div.id='cmt-'+c.id;
      div.innerHTML = '<div class="cmt-hdr"><span class="cmt-author">'+san(c.author)+'</span>'
        + '<span class="cmt-time">just now</span>'+del+'</div>'
        + '<p class="cmt-txt">'+san(c.text)+'</p>';
      list.appendChild(div);
    }
    toast('Comment posted! ✓');
  });
}

function doCmtDel(postId, cid) {
  var user = getUser();
  if (!user) return;
  customConfirm('Remove this comment?', 'Remove', function() {
    apiDel('/api/posts/' + postId + '/comments/' + cid).then(function(r) {
      if (!r.ok) return toast(r.data.error || 'Could not delete.');
      var el = document.getElementById('cmt-' + cid); if (el) el.remove();
      toast('Removed.');
    });
  });
}

/* ── SIDEBAR SEARCH ── */
var _srchTimer;
function doSearch(q) {
  var out = document.getElementById('srch-out');
  if (!q || q.trim().length < 2) { out.innerHTML = ''; return; }
  clearTimeout(_srchTimer);
  _srchTimer = setTimeout(function() {
    apiGet('/api/posts?q=' + encodeURIComponent(q)).then(function(r) {
      if (!r.ok || !r.data.length) { out.innerHTML = '<p class="empty">No results.</p>'; return; }
      out.innerHTML = r.data.map(function(p) {
        return '<div class="sr-item" onclick="closeSidebar();showBlog();openPost('+p.id+')">'
          + '<div class="sr-title">'+san(p.title)+'</div>'
          + '<div class="sr-exc">'+san(p.excerpt)+'</div></div>';
      }).join('');
    });
  }, 300);
}

/* ── POST ADMIN MODAL ── */
function openNewPostModal() {
  document.getElementById('post-modal-h').textContent = 'New Essay';
  document.getElementById('edit-id').value = '';
  ['f-title','f-exc','f-body','f-tags'].forEach(function(id){ document.getElementById(id).value = ''; });
  document.getElementById('f-rt').value = '3';
  document.getElementById('post-modal-err').textContent = '';
  document.getElementById('post-modal-sub').textContent = 'Publish';
  document.getElementById('post-modal').classList.add('open');
}
function openEditPostModal(id) {
  var p = allPosts.find(function(x){ return x.id === id; });
  if (!p && curPost && curPost.id === id) p = curPost;
  if (!p) return;
  document.getElementById('post-modal-h').textContent = 'Edit Essay';
  document.getElementById('edit-id').value = id;
  document.getElementById('f-title').value = p.title;
  document.getElementById('f-exc').value = p.excerpt;
  document.getElementById('f-body').value = p.content;
  document.getElementById('f-tags').value = (p.tags||[]).join(', ');
  document.getElementById('f-rt').value = p.readTime;
  document.getElementById('post-modal-err').textContent = '';
  document.getElementById('post-modal-sub').textContent = 'Update';
  document.getElementById('post-modal').classList.add('open');
}
function closePostModal() { document.getElementById('post-modal').classList.remove('open'); }

function submitPost() {
  var id      = document.getElementById('edit-id').value;
  var title   = (document.getElementById('f-title').value||'').trim();
  var content = (document.getElementById('f-body').value||'').trim();
  var errEl   = document.getElementById('post-modal-err');
  if (!title)   { errEl.textContent = 'Title is required.'; return; }
  if (!content) { errEl.textContent = 'Content is required.'; return; }
  errEl.textContent = '';
  var body = { title: title, content: content,
    excerpt: document.getElementById('f-exc').value,
    tags:    document.getElementById('f-tags').value,
    readTime:document.getElementById('f-rt').value };
  var req = id ? apiPut('/api/posts/' + id, body) : apiPost('/api/posts', body);
  req.then(function(r) {
    if (!r.ok) { errEl.textContent = r.data.error || 'Could not save.'; return; }
    closePostModal();
    toast(id ? 'Updated! ✓' : 'Published! 🎉');
    if (id && curPost && curPost.id === parseInt(id)) reloadCurrentPost();
    else { showBlogList(); }
  });
}

function doDeletePost(id) {
  customConfirm('Delete this essay?', '🗑 Delete', function() {
    apiDel('/api/posts/' + id).then(function(r) {
      if (!r.ok) return toast(r.data.error || 'Could not delete.');
      toast('Deleted.');
      if (curPost && curPost.id === id) showBlogList();
      else { allPosts = allPosts.filter(function(p){ return p.id !== id; }); renderPosts(); }
    });
  });
}

/* ══════════════════════════════════════════════════════════════════════════════
   DISCUSSIONS
══════════════════════════════════════════════════════════════════════════════ */
var allDiscs = [];

function loadDiscussions() {
  var q   = (document.getElementById('disc-srch').value||'').trim();
  var qs  = activeTag ? '?tag=' + encodeURIComponent(activeTag) : (q.length >= 2 ? '?q=' + encodeURIComponent(q) : '');
  document.getElementById('disc-list-el').innerHTML = '<p class="loading">Loading…</p>';
  apiGet('/api/discussions' + qs).then(function(r) {
    if (!r.ok) { document.getElementById('disc-list-el').innerHTML = '<p class="empty">Could not load.</p>'; return; }
    allDiscs = r.data;
    renderDiscList();
    renderTagsBar();
  });
}

function renderDiscList() {
  var el = document.getElementById('disc-list-el');
  if (!allDiscs.length) { el.innerHTML = '<div class="empty-state"><h3>No discussions yet</h3><p>Be the first to start one!</p></div>'; return; }
  el.innerHTML = allDiscs.map(function(d) {
    var open = d.is_open !== 0;
    var tags = (d.tags||[]).map(function(t){ return '<span class="disc-tag-chip" onclick="event.stopPropagation();setTagFilter(\''+san(t)+'\')">'+san(t)+'</span>'; }).join('');
    var branches = d.branch_count || 0;
    return '<div class="disc-card" onclick="openDisc('+d.id+')">'
      + '<div class="disc-card-head"><div class="disc-title-txt">'+san(d.title)+'</div>'
      + '<span class="disc-status '+(open?'open':'closed')+'">'+(open?'Open':'Closed')+'</span></div>'
      + (d.body ? '<div class="disc-body-prev">'+san(d.body)+'</div>' : '')
      + '<div class="disc-footer"><span class="disc-meta-txt">by <strong style="color:var(--txt)">'+san(d.author)+'</strong> · '+fmtDate(d.created_at*1000)+'</span>'
      + tags + '<span style="font-size:.73rem;color:var(--dim);margin-left:auto">🌿 '+Math.max(0,branches-1)+' branches</span></div>'
      + '</div>';
  }).join('');
}

function renderTagsBar() {
  var tagMap = {};
  allDiscs.forEach(function(d){ (d.tags||[]).forEach(function(t){ tagMap[t]=(tagMap[t]||0)+1; }); });
  var tags = Object.keys(tagMap).sort(function(a,b){ return tagMap[b]-tagMap[a]; }).slice(0,15);
  var el = document.getElementById('disc-tags-bar');
  if (!tags.length) { el.innerHTML = ''; return; }
  el.innerHTML = '<span class="tags-lbl">Filter:</span>'
    + '<span class="filter-tag'+(activeTag===null?' active':'')+'" onclick="setTagFilter(null)">All</span>'
    + tags.map(function(t){ return '<span class="filter-tag'+(activeTag===t?' active':'')+'" onclick="setTagFilter(\''+san(t)+'\')">'+san(t)+'</span>'; }).join('');
}

function setTagFilter(tag) { activeTag = tag; loadDiscussions(); }

function loadDiscPanel() {
  apiGet('/api/discussions?limit=4').then(function(r) {
    var el = document.getElementById('disc-panel');
    if (!r.ok || !r.data.length) { el.innerHTML = '<p class="empty">No discussions yet.</p>'; return; }
    el.innerHTML = r.data.slice(0,4).map(function(d) {
      return '<div class="di-item" onclick="showDiscussions();openDisc('+d.id+')">'
        + '<div class="di-ttl">'+san(d.title)+'</div>'
        + '<div class="di-meta">'+san(d.author)+' · '+ago(d.created_at*1000)+'</div></div>';
    }).join('') + '<div style="margin-top:8px"><button class="btn-link" style="font-size:.76rem" onclick="showDiscussions()">View all →</button></div>';
  });
}

function openDisc(id) {
  currentDisc = null; openFormIds = {};
  document.getElementById('disc-list-view').style.display = 'none';
  document.getElementById('disc-detail-view').style.display = '';
  document.getElementById('disc-detail-inner').innerHTML = '<p class="loading">Loading…</p>';
  document.getElementById('tree-container').innerHTML = '';
  loadDiscDetail(id);
  window.scrollTo(0, 0);
}

function loadDiscDetail(id) {
  apiGet('/api/discussions/' + id).then(function(r) {
    if (!r.ok) { document.getElementById('disc-detail-inner').innerHTML = '<p class="empty">Not found.</p>'; return; }
    currentDisc = r.data;
    buildDiscDetail(r.data);
  });
}

function backToDiscList() {
  currentDisc = null; openFormIds = {};
  document.getElementById('disc-list-view').style.display = '';
  document.getElementById('disc-detail-view').style.display = 'none';
  document.getElementById('disc-srch').value = '';
  activeTag = null;
  loadDiscussions();
}

function buildDiscDetail(d) {
  var user = getUser(), admin = isAdmin();
  var tags = (d.tags||[]).map(function(t){ return '<span class="disc-tag-chip">'+san(t)+'</span>'; }).join('');
  var open = d.is_open !== 0;
  var canDelete = admin || (user && user.name === d.author);
  var adminActs = (admin || canDelete)
    ? '<div style="display:flex;gap:8px;margin-left:auto">'
      + (admin ? (open ? '<button class="btn btn-out btn-sm" onclick="doCloseDisc('+d.id+')">🔒 Close</button>' : '<span style="font-size:.78rem;color:var(--faint)">Closed</span>') : '')
      + (canDelete ? '<button class="btn btn-red btn-sm" onclick="doDeleteDisc('+d.id+')">🗑 Delete</button>' : '')
      + '</div>' : '';

  document.getElementById('disc-detail-inner').innerHTML =
    '<div style="display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:8px">'
    + '<h1 class="d-title-h" style="flex:1">'+san(d.title)+'</h1>'
    + '<span class="disc-status '+(open?'open':'closed')+'">'+(open?'Open':'Closed')+'</span></div>'
    + '<div class="d-meta-bar"><span>Started by <strong style="color:var(--txt)">'+san(d.author)+'</strong></span>'
    + '<span>'+fmtDate(d.created_at*1000)+'</span>'
    + (tags?'<div style="display:flex;gap:5px;flex-wrap:wrap">'+tags+'</div>':'')
    + adminActs + '</div>'
    + '<div class="tree-hint">🌿 Branch to extend a thread · 💡 Post a different opinion · 🍃 Add a leaf to endorse (+2 pts) · 🔀 Merge vote to unify · Branching from someone else gives them +5 pts</div>';

  document.getElementById('tree-container').innerHTML =
    renderBranchTree(d.branches||[], d, user, admin);
}

/* ══════════════════════════════════════════════════════════════════════════════
   BRANCH TREE RENDERING
══════════════════════════════════════════════════════════════════════════════ */
function renderBranchTree(branches, disc, user, admin) {
  if (!branches || !branches.length) return '<p class="empty">No branches yet.</p>';
  return branches.map(function(b){ return renderBranch(b, disc, user, admin); }).join('');
}

function renderBranch(b, disc, user, admin) {
  var userEmail   = user ? user.email.toLowerCase() : null;
  var userName    = user ? user.name : null;
  var leaves      = b.leaves || [];
  var leafCount   = leaves.length;
  var hasLeafed   = userEmail && leaves.indexOf(userEmail) >= 0;
  var isOwnBranch = userName && b.author === userName;
  var mergeVotes  = b.mergeVotes || [];
  var hasMerged   = userEmail && mergeVotes.indexOf(userEmail) >= 0;
  var mc          = mergeVotes.length;
  var cc          = (b.children||[]).length;
  var open        = disc.is_open !== 0;
  var typeLabel   = b.type === 'root' ? 'root thread' : b.type === 'opinion' ? 'different opinion' : 'branch';
  var cardClass   = 'branch-card' + (b.type==='root'?' root-branch':'') + (b.type==='opinion'?' opinion-branch':'');

  var html = '<div class="branch-node" id="bnode-'+b.id+'">'
    + '<div class="'+cardClass+'">'
    + '<div class="branch-hdr">'
    + '<span class="branch-author-nm">'+san(b.author)+'</span>'
    + '<span class="branch-time-txt">'+ago(b.created_at*1000)+'</span>'
    + '<span class="branch-type-badge btype-'+b.type+'">'+typeLabel+'</span>'
    + (b.author_pts > 0 ? '<span class="branch-pts-lbl">⭐'+b.author_pts+' pts</span>' : '')
    + '</div>'
    + '<div class="branch-txt-body">'+san(b.text)+'</div>'
    + '<div class="branch-acts">';

  // 🍃 Leaf button
  if (!user) {
    html += '<button class="vote-btn" onclick="openAuthModal(\'login\')" title="Sign in to add a leaf">🍃 '+leafCount+(leafCount===1?' leaf':' leaves')+'</button>';
  } else if (isOwnBranch) {
    html += '<span class="vote-btn" style="cursor:default;opacity:.5" title="You cannot leaf your own branch">🍃 '+leafCount+(leafCount===1?' leaf':' leaves')+'</span>';
  } else {
    html += '<button class="vote-btn'+(hasLeafed?' vu':'')+'" onclick="doLeaf('+disc.id+','+b.id+')" title="'+(hasLeafed?'Remove leaf':'Add leaf — +2 pts to author')+'">'
      + '🍃 '+(hasLeafed?'Leafed':'Add Leaf')+(leafCount>0?' ('+leafCount+')':'')+'</button>';
  }

  // 🔀 Merge vote
  if (b.type !== 'root') {
    html += '<button class="vote-btn'+(hasMerged?' vm':'')+'" onclick="doMerge('+disc.id+','+b.id+')" title="Vote to merge back to main thread">🔀 Merge'+(mc>0?' ('+mc+')':'')+'</button>';
    if (mc >= 3) html += '<span class="merge-badge">✓ Merge requested</span>';
  }

  // Branch / Opinion button
  if (open) {
    html += !user
      ? '<button class="act-btn" onclick="openAuthModal(\'login\')">+ Branch</button>'
      : '<button class="act-btn" onclick="toggleInlineForm('+disc.id+','+b.id+')">+ Branch / Opinion</button>';
  }

  // Admin delete
  if (admin && b.type !== 'root') {
    html += '<button class="act-btn" style="color:var(--red);border-color:var(--red)" onclick="doDeleteBranch('+disc.id+','+b.id+')">✕</button>';
  }

  html += '</div>';
  if (cc > 0) html += '<div class="children-count">🌿 '+cc+' direct branch'+(cc===1?'':'es')+'</div>';
  html += '</div>';

  // Inline form
  var formOpen = openFormIds[b.id];
  html += '<div class="inline-form'+(formOpen?' open':'')+'" id="iform-'+b.id+'">'
    + buildInlineForm(disc, b) + '</div>';

  // Children
  if (b.children && b.children.length) {
    html += '<div class="branch-indent">';
    html += b.children.map(function(c){ return renderBranch(c, disc, user, admin); }).join('');
    html += '</div>';
  }

  return html + '</div>';
}

function buildInlineForm(disc, pb) {
  var type = openFormIds[pb.id] || 'branch';
  return '<div class="form-tabs">'
    + '<button class="ftab'+(type==='branch'?' active':'')+'" onclick="setFormType('+disc.id+','+pb.id+',\'branch\')">🌿 Continue Branch</button>'
    + '<button class="ftab'+(type==='opinion'?' active':'')+'" onclick="setFormType('+disc.id+','+pb.id+',\'opinion\')">💡 Different Opinion</button>'
    + '</div>'
    + '<div class="fg"><textarea class="txa" id="txa-'+pb.id+'" placeholder="'
      + (type==='opinion'?'Share a different perspective…':'Continue this thread of thought…')
      + '" style="min-height:70px"></textarea></div>'
    + '<div style="display:flex;gap:8px">'
    + '<button class="btn btn-acc btn-sm" onclick="submitBranch('+disc.id+','+pb.id+')">Post</button>'
    + '<button class="btn btn-ghost btn-sm" onclick="toggleInlineForm('+disc.id+','+pb.id+')">Cancel</button>'
    + '</div>';
}

function toggleInlineForm(discId, branchId) {
  if (openFormIds[branchId]) delete openFormIds[branchId];
  else openFormIds[branchId] = 'branch';
  if (currentDisc) loadDiscDetail(currentDisc.id);
}

function setFormType(discId, branchId, type) {
  openFormIds[branchId] = type;
  var el = document.getElementById('iform-'+branchId);
  if (!el || !currentDisc) return;
  function find(branches) {
    for (var i=0;i<branches.length;i++){
      if (branches[i].id===branchId) return branches[i];
      var found = find(branches[i].children||[]);
      if (found) return found;
    }
  }
  var b = find(currentDisc.branches||[]);
  if (b) el.innerHTML = buildInlineForm(currentDisc, b);
}

/* ══════════════════════════════════════════════════════════════════════════════
   BRANCH ACTIONS → API
══════════════════════════════════════════════════════════════════════════════ */
function submitBranch(discId, parentBranchId) {
  var user = getUser(); if (!user) return openAuthModal('login');
  var txa  = document.getElementById('txa-'+parentBranchId); if (!txa) return;
  var text = txa.value.trim(); if (!text) return toast('Please write something before posting.');
  var type = openFormIds[parentBranchId] || 'branch';
  apiPost('/api/discussions/' + discId + '/branches', { parentBranchId: parentBranchId, text: text, type: type })
    .then(function(r) {
      if (!r.ok) return toast(r.data.error || 'Could not post branch.');
      delete openFormIds[parentBranchId];
      toast(type === 'opinion' ? 'Opinion posted! 💡' : 'Branch added! 🌿');
      renderAuth();
      loadDiscDetail(discId);
    });
}

function doLeaf(discId, branchId) {
  var user = getUser(); if (!user) return openAuthModal('login');
  apiPost('/api/discussions/' + discId + '/branches/' + branchId + '/leaf')
    .then(function(r) {
      if (!r.ok) return toast(r.data.error || 'Could not add leaf.');
      renderAuth();
      loadDiscDetail(discId);
    });
}

function doMerge(discId, branchId) {
  var user = getUser(); if (!user) return openAuthModal('login');
  apiPost('/api/discussions/' + discId + '/branches/' + branchId + '/merge')
    .then(function(r) {
      if (!r.ok) return toast(r.data.error || 'Could not vote.');
      loadDiscDetail(discId);
    });
}

function doDeleteBranch(discId, branchId) {
  customConfirm('Delete this branch and all its children?', '🗑 Delete Branch', function() {
    apiDel('/api/discussions/' + discId + '/branches/' + branchId).then(function(r) {
      if (!r.ok) return toast(r.data.error || 'Could not delete.');
      toast('Branch deleted.');
      loadDiscDetail(discId);
    });
  });
}

/* ══════════════════════════════════════════════════════════════════════════════
   NEW DISCUSSION
══════════════════════════════════════════════════════════════════════════════ */
function openNewDiscForm() {
  if (!getUser()) { pendingAction = openNewDiscForm; openAuthModal('login'); return; }
  document.getElementById('new-disc-form').classList.add('open');
  document.getElementById('disc-title').focus();
  document.getElementById('new-disc-form').scrollIntoView({ behavior:'smooth' });
}
function closeNewDiscForm() {
  document.getElementById('new-disc-form').classList.remove('open');
  document.getElementById('disc-title').value = '';
  document.getElementById('disc-body-inp').value = '';
  document.getElementById('tag-inp').value = '';
  pendingTags = []; renderTagPills();
  document.getElementById('new-disc-err').textContent = '';
}
function handleTagKey(e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    var val = e.target.value.trim().toLowerCase().replace(/,/g,'');
    if (val && pendingTags.indexOf(val) < 0 && pendingTags.length < 5) { pendingTags.push(val); renderTagPills(); }
    e.target.value = '';
  }
}
function renderTagPills() {
  document.getElementById('tag-pills').innerHTML = pendingTags.map(function(t,i){
    return '<span class="tag-pill">'+san(t)+'<button onclick="removeTag('+i+')" title="Remove">×</button></span>';
  }).join('');
}
function removeTag(i){ pendingTags.splice(i,1); renderTagPills(); }

function submitDisc() {
  var user = getUser(); if (!user) return openAuthModal('login');
  var title = (document.getElementById('disc-title').value||'').trim();
  var body  = (document.getElementById('disc-body-inp').value||'').trim();
  var tagInp = (document.getElementById('tag-inp').value||'').trim().toLowerCase();
  if (tagInp && pendingTags.indexOf(tagInp) < 0) pendingTags.push(tagInp);
  var errEl = document.getElementById('new-disc-err');
  if (!title) { errEl.textContent = 'Please enter a title.'; return; }
  errEl.textContent = '';
  apiPost('/api/discussions', { title: title, body: body, tags: pendingTags }).then(function(r) {
    if (!r.ok) { errEl.textContent = r.data.error || 'Could not create.'; return; }
    toast('Discussion started! 🌱');
    closeNewDiscForm();
    showDiscussions();
    openDisc(r.data.id);
  });
}

/* ══════════════════════════════════════════════════════════════════════════════
   ADMIN — DISCUSSIONS
══════════════════════════════════════════════════════════════════════════════ */
function doCloseDisc(id) {
  customConfirm('Close this discussion? No new branches can be added.', '🔒 Close Discussion', function() {
    apiPost('/api/discussions/' + id + '/close').then(function(r) {
      if (!r.ok) return toast(r.data.error || 'Could not close.');
      toast('Discussion closed.'); loadDiscDetail(id);
    });
  });
}
function doDeleteDisc(id) {
  customConfirm('Delete this discussion and all its branches? This cannot be undone.', '🗑 Delete', function() {
    apiDel('/api/discussions/' + id).then(function(r) {
      if (!r.ok) return toast(r.data.error || 'Could not delete.');
      toast('Deleted.'); backToDiscList();
    });
  });
}

/* ══════════════════════════════════════════════════════════════════════════════
   LEADERBOARD
══════════════════════════════════════════════════════════════════════════════ */
function openLeaderboard() {
  document.getElementById('lb-body').innerHTML = '<p class="loading">Loading…</p>';
  document.getElementById('lb-modal').classList.add('open');
  apiGet('/api/leaderboard').then(function(r) {
    var medals = ['🥇','🥈','🥉'];
    if (!r.ok || !r.data.length) {
      document.getElementById('lb-body').innerHTML = '<p class="empty" style="text-align:center;padding:20px">No points yet. Start a discussion!</p>';
      return;
    }
    document.getElementById('lb-body').innerHTML = r.data.map(function(e,i){
      return '<div class="lb-row"><span class="lb-rank">'+(medals[i]||'#'+(i+1))+'</span>'
        + '<span class="lb-name">'+san(e.name)+'</span>'
        + '<span class="lb-pts-val">'+e.total+' pts</span></div>';
    }).join('');
  });
}
function closeLbModal(){ document.getElementById('lb-modal').classList.remove('open'); }
</script>
